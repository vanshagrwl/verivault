name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build --workspaces

      - name: TypeScript build
        run: npm run build

      - name: Lint
        run: npm run lint || true

      - name: Create backend Docker image (artifact)
        run: |
          docker build -f Dockerfile.server -t verivault-backend:ci .
          docker save verivault-backend:ci | gzip > backend-image.tar.gz

      - name: Upload backend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: backend-image.tar.gz
